apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: tracing-poc
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        # D5: excludes these pods from a future node-collection log DaemonSet
        logs.export/otlp: "true"
    spec:
      containers:
        - name: order-service
          # tag is set per-overlay via kustomize `images:` (Makefile writes the git SHA)
          image: 192.168.56.20:5000/order-service:dev
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            - name: STOCK_SERVICE_URL
              value: http://stock-service:8080
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
