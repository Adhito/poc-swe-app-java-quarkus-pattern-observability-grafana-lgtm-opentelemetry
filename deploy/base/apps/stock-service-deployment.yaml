apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-service
  namespace: tracing-poc
  labels:
    app: stock-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-service
  template:
    metadata:
      labels:
        app: stock-service
        # D5: excludes these pods from a future node-collection log DaemonSet
        logs.export/otlp: "true"
    spec:
      containers:
        - name: stock-service
          # tag is set per-overlay via kustomize `images:` (Makefile writes the git SHA)
          image: 192.168.56.20:5000/stock-service:dev
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            # plain credentials — authentication is an explicit non-goal (PRD §3)
            - name: POSTGRES_JDBC_URL
              value: jdbc:postgresql://postgres:5432/stock
            - name: POSTGRES_USER
              value: stock
            - name: POSTGRES_PASSWORD
              value: stock
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
