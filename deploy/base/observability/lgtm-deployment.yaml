apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  namespace: observability
  labels:
    app: lgtm
spec:
  replicas: 1
  # all-in-one with ephemeral storage — no rolling update (data would diverge anyway)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:0.29.0
          ports:
            - name: grafana
              containerPort: 3000
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          env:
            # anonymous admin access — POC only, no auth per PRD non-goals
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
          readinessProbe:
            httpGet:
              path: /api/health
              port: grafana
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 3Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        # ephemeral — acceptable for the POC (PRD non-goals: no trace storage sizing/retention)
        - name: data
          emptyDir: {}
