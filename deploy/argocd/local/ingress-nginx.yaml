apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # after MetalLB — needs a LoadBalancer IP
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1 # pinned per D7 — recorded in docs/runbook.md
    helm:
      valuesObject:
        controller:
          ingressClassResource:
            default: true
          service:
            type: LoadBalancer
            annotations:
              # Pin the LB IP so nip.io hostnames are deterministic:
              # grafana.192.168.56.240.nip.io etc. (D3/D10)
              # (older MetalLB releases used metallb.universe.tf/loadBalancerIPs)
              metallb.io/loadBalancerIPs: 192.168.56.240
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
