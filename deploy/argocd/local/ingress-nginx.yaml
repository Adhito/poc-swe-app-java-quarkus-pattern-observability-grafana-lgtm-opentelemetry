apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # after MetalLB — needs a LoadBalancer IP
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    # pinned per D7 — recorded in docs/runbook.md. Chart 4.13.x (controller
    # v1.13) supports K8s 1.29–1.33: covers the current 1.29 cluster (D10(c)
    # bump deferred) AND a later 1.33 upgrade without a chart change.
    # (4.15.x requires K8s >= 1.31 and would NOT run on 1.29.)
    targetRevision: 4.13.9
    helm:
      valuesObject:
        controller:
          # No admission webhook: removes the chart's certgen hook Jobs, which
          # repeatedly wedged ArgoCD 2.14 ("Pending deletion" on an already-
          # deleted hook Job, surviving a controller restart). The webhook only
          # validates Ingress specs at admission — dispensable for this POC,
          # and disabling makes the chart hook-free (plain resources, nothing
          # for ArgoCD to choreograph). See documents/CLAUDE-CODE-FIXING-LOG.md.
          admissionWebhooks:
            enabled: false
          ingressClassResource:
            default: true
          service:
            type: LoadBalancer
            annotations:
              # Pin the LB IP so nip.io hostnames are deterministic:
              # grafana.192.168.56.240.nip.io etc. (D3/D10)
              # (older MetalLB releases used metallb.universe.tf/loadBalancerIPs)
              metallb.io/loadBalancerIPs: 192.168.56.240
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
