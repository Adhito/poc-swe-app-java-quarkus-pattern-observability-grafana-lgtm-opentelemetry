# Syncs the whole `local` Kustomize overlay: observability namespace
# (collector + LGTM + ingresses), platform (Postgres/Kafka in later phases),
# apps (services in later phases), and the MetalLB address pool CRs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-local
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2" # MetalLB CRDs + ingress class must exist first
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Adhito/poc-swe-app-java-quarkus-pattern-observability-grafana-lgtm-opentelemetry.git
    targetRevision: main
    path: deploy/overlays/local
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
