# Makes the cluster nodes' container runtime trust the Dev VM registry over
# plain HTTP (PRD D9). Adapted for CRI-O: the PRD assumed containerd, but the
# cluster runs CRI-O 1.33 (kubectl get nodes -o wide), so trust lives in
# /etc/containers/registries.conf.d — not containerd's certs.d/hosts.toml.
#
# Run from the Dev VM:
#   cp inventory.example.ini inventory.ini
#   ansible-playbook -i inventory.ini registry-trust.yaml
---
- name: Trust the Dev VM registry in CRI-O
  hosts: k8s_nodes
  become: true
  vars:
    registry_host: "192.168.56.20:5000"

  tasks:
    - name: Ensure registries.conf.d exists
      ansible.builtin.file:
        path: /etc/containers/registries.conf.d
        state: directory
        mode: "0755"

    - name: Drop insecure-registry config for the Dev VM registry
      ansible.builtin.copy:
        dest: /etc/containers/registries.conf.d/dev-vm-registry.conf
        mode: "0644"
        content: |
          # Managed by infra/ansible/registry-trust.yaml (quarkus-tracing-poc).
          # Allows plain-HTTP pulls from the Dev VM registry (PRD D9).
          [[registry]]
          location = "{{ registry_host }}"
          insecure = true
      notify: Restart crio

    # Cleanup: an earlier version of this playbook assumed containerd and
    # created these on the nodes. They are inert under CRI-O — remove them.
    # No-ops on fresh nodes.
    - name: Remove leftover containerd trust files from the earlier attempt
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/etc/containerd/certs.d/{{ registry_host }}"
        - /etc/containerd/config.toml

    - name: Verify the registry config landed
      ansible.builtin.command: grep -F 'location = "{{ registry_host }}"' /etc/containers/registries.conf.d/dev-vm-registry.conf
      changed_when: false

  handlers:
    # Restart is safe: running containers are kept alive by their conmon
    # processes; kubelet reconnects to the CRI socket.
    - name: Restart crio
      ansible.builtin.systemd:
        name: crio
        state: restarted
