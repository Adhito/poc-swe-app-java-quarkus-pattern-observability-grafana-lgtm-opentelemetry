quarkus.application.name=order-service

# CORS for the browser SPA (Phase 3): the frontend origin makes a cross-origin
# POST /orders and must be allowed to send the traceparent/tracestate headers,
# else the W3C context can't propagate browser -> order-service (PRD 6.1).
# Env-overridable so EKS overlays can set their own origin(s) (D4).
# NOTE: the enable key is `quarkus.http.cors.enabled` in Quarkus 3.x — the older
# bare `quarkus.http.cors=true` is silently ignored and CORS stays disabled.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://app.192.168.56.240.nip.io}
quarkus.http.cors.headers=content-type,traceparent,tracestate
quarkus.http.cors.methods=GET,POST,OPTIONS

# stock-service REST client — k8s overrides via STOCK_SERVICE_URL (deployment env);
# default targets local dev-mode stock-service on 8081
quarkus.rest-client.stock.url=${STOCK_SERVICE_URL:http://localhost:8081}

# Kafka producer (Phase 4 / S5): publish OrderPlaced to the `orders` topic.
# Serializer is auto-detected by Quarkus from the OrderPlaced type (jackson JSON).
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:kafka:9092}
mp.messaging.outgoing.orders-out.connector=smallrye-kafka
mp.messaging.outgoing.orders-out.topic=orders
# explicit for clarity — trace context injected into record headers (default on with otel)
mp.messaging.outgoing.orders-out.tracing-enabled=true

# OTLP export — k8s overrides via QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT to the
# in-cluster collector (telemetry path per PRD 4.2, never in the request path)
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# D5: app logs ship over OTLP through the collector to Loki, traceId/spanId as
# native OTel log record fields
quarkus.otel.logs.enabled=true

# D5: JSON console logging stays on so `kubectl logs` remains usable;
# trace_id/span_id appear in the JSON under "mdc" (populated by Quarkus OTel).
# NOTE: the key is `...json.enabled` in Quarkus 3.x — the bare
# `quarkus.log.console.json=true` is an unknown property and silently ignored.
quarkus.log.console.json.enabled=true
%dev.quarkus.log.console.json.enabled=false

# Container image per PRD D9: Dev VM registry, plain HTTP, Jib (daemonless);
# tag is passed by the Makefile as the git SHA
quarkus.container-image.registry=192.168.56.20:5000
quarkus.container-image.group=
quarkus.container-image.insecure=true
