quarkus.application.name=notification-service

# local dev-mode runs beside order (8080) and stock (8081)
%dev.quarkus.http.port=8082

# Kafka consumer (Phase 4 / S5): read OrderPlaced from the `orders` topic.
# Deserializer is auto-detected by Quarkus from the OrderPlaced param type.
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:kafka:9092}
mp.messaging.incoming.orders-in.connector=smallrye-kafka
mp.messaging.incoming.orders-in.topic=orders
mp.messaging.incoming.orders-in.group.id=notification-service
mp.messaging.incoming.orders-in.auto.offset.reset=earliest
# explicit for clarity — trace context extracted from record headers (default on with otel)
mp.messaging.incoming.orders-in.tracing-enabled=true

# OTLP export — k8s overrides via QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT (PRD 4.2)
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# D5: app logs over OTLP to Loki with traceId/spanId as native fields
quarkus.otel.logs.enabled=true

# D5: JSON console logging stays on for `kubectl logs`
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false

# Container image per PRD D9: Dev VM registry, plain HTTP, Jib, git-SHA tag
quarkus.container-image.registry=192.168.56.20:5000
quarkus.container-image.group=
quarkus.container-image.insecure=true
