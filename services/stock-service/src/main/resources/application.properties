quarkus.application.name=stock-service

# local dev-mode runs beside order-service (which owns 8080); in-cluster both use 8080
%dev.quarkus.http.port=8081

# OTLP export — k8s overrides via QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT to the
# in-cluster collector (telemetry path per PRD 4.2, never in the request path)
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

# Container image per PRD D9: Dev VM registry, plain HTTP, Jib (daemonless);
# tag is passed by the Makefile as the git SHA
quarkus.container-image.registry=192.168.56.20:5000
quarkus.container-image.group=
quarkus.container-image.insecure=true
