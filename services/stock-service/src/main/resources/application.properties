quarkus.application.name=stock-service

# local dev-mode runs beside order-service (which owns 8080); in-cluster both use 8080
%dev.quarkus.http.port=8081

# PostgreSQL via instrumented JDBC (PRD 5.2/S2) — k8s overrides via env
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/stock}
quarkus.datasource.username=${POSTGRES_USER:stock}
quarkus.datasource.password=${POSTGRES_PASSWORD:stock}
# the S2 switch: wraps the datasource so every statement becomes a db.* span
# with db.statement carrying the SQL
quarkus.datasource.jdbc.telemetry=true

# OTLP export — k8s overrides via QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT to the
# in-cluster collector (telemetry path per PRD 4.2, never in the request path)
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# D5: app logs ship over OTLP through the collector to Loki, traceId/spanId as
# native OTel log record fields
quarkus.otel.logs.enabled=true

# D5: JSON console logging stays on so `kubectl logs` remains usable;
# trace_id/span_id appear in the JSON via MDC
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false

# Container image per PRD D9: Dev VM registry, plain HTTP, Jib (daemonless);
# tag is passed by the Makefile as the git SHA
quarkus.container-image.registry=192.168.56.20:5000
quarkus.container-image.group=
quarkus.container-image.insecure=true
