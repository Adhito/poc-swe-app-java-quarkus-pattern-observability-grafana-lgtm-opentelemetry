<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tracing POC — Place Order</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 3rem auto; padding: 0 1rem; }
      h1 { font-size: 1.3rem; }
      label { display: block; margin: 0.75rem 0 0.25rem; }
      input, button { font-size: 1rem; padding: 0.4rem 0.6rem; }
      button { margin-top: 1rem; cursor: pointer; }
      #result { white-space: pre-wrap; margin-top: 1.5rem; padding: 0.75rem; background: #f4f4f5; border-radius: 6px; min-height: 2rem; }
    </style>
    <!-- config.js is generated at container start from env (API_BASE_URL, OTLP_URL);
         must load BEFORE the bundle so window.__APP_CONFIG__ exists -->
    <script src="config.js"></script>
  </head>
  <body>
    <h1>Tracing POC — Place an order</h1>
    <p>Places an order via order-service. The click starts the root span; the trace flows browser → order → stock → SQL.</p>
    <form id="order-form">
      <label for="sku">SKU</label>
      <input id="sku" value="SKU-1" />
      <label for="quantity">Quantity</label>
      <input id="quantity" type="number" value="2" min="1" />
      <button type="submit">Place order</button>
    </form>
    <div id="result"></div>
    <script src="bundle.js"></script>
  </body>
</html>
